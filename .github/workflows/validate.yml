name: Validate Sentinel content

on:
  pull_request:
    branches: [ main ]

jobs:
  validate-detections:
    name: Validate Sentinel analytic rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Sentinel Analytics Rules
        uses: SecureHats/validate-detections@v2
        with:
          filesPath: analytic-rules
          logLevel: Normal
